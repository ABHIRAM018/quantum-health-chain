services:
  # The Web Service for our frontend + backend
  - type: web
    name: quantum-health-chain
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qhc-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

# The PostgreSQL database 
databases: 
  - name: qhc-db 
    plan: free 
    databaseName: quantum_health_chain 
    user: qhc_user
